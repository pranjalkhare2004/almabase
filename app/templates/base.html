<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Structured Questionnaire Answering Tool — AI-powered answers from your reference documents.">
    <title>{% block title %}QA Tool{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">📋 <span>QA</span>Tool</a>
            <div class="nav-links">
                {% if user %}
                    <a href="/dashboard">Dashboard</a>
                    <a href="/logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                    <a href="/register" class="btn btn-primary btn-sm">Get Started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            &copy; 2026 QATool — Structured Questionnaire Answering Tool by AlmaBase
        </div>
    </footer>

    <!-- Loading overlay for generate -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Generating answers with AI... This may take a moment.</p>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
